version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: llmchat
      POSTGRES_USER: llmchat
      POSTGRES_PASSWORD: llmchat
    ports:
      - '5444:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6399:6379'

volumes:
  postgres_data:
